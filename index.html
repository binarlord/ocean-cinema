<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Океан Кино</title>
    <meta name="description" content="Океан Кино — смотри новинки кино онлайн бесплатно">
    <meta name="robots" content="index, follow">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-image: url('https://images.pexels.com/photos/1261728/pexels-photo-1261728.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: -1;
        }
        .navbar {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(14px);
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            border-bottom: 1px solid #8b5cf6;
        }
        .nav-btn {
            background: linear-gradient(135deg, rgba(139,92,246,0.15), rgba(46,16,101,0.3));
            color: white;
            border: 1px solid rgba(139,92,246,0.6);
            padding: 8px 14px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.3s;
        }
        .nav-btn:hover {
            background: #8b5cf6;
            transform: translateY(-2px);
        }
        .search-section {
            padding: 20px 16px;
            max-width: 500px;
            margin: 0 auto;
        }
        .search-container {
            display: flex;
            background: rgba(0,0,0,0.7);
            border-radius: 50px;
            padding: 4px;
            border: 1px solid #8b5cf6;
        }
        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 16px;
            font-size: 14px;
            color: white;
            outline: none;
        }
        .search-btn {
            background: #8b5cf6;
            border: none;
            padding: 0 20px;
            border-radius: 50px;
            color: white;
            font-size: 13px;
            cursor: pointer;
        }
        .hero {
            text-align: center;
            padding: 20px 16px;
        }
        .hero h1 {
            font-size: 42px;
            background: linear-gradient(135deg, #c084fc, #8b5cf6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 60px;
            border: 2px solid #8b5cf6;
        }
        .donate-section {
            display: flex;
            justify-content: center;
            margin: 16px;
        }
        .modern-donate {
            max-width: 400px;
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, rgba(30,27,75,0.95), rgba(46,16,101,0.95));
            border-radius: 28px;
            border: 1px solid rgba(139,92,246,0.5);
            text-align: center;
        }
        .donate-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }
        .donate-btn {
            background: #8b5cf6;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        .qr-wrapper {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 8px;
        }
        .qr-code-modern img {
            border-radius: 12px;
            background: white;
            padding: 6px;
            width: 100px;
        }
        .qr-text {
            font-size: 10px;
        }
        .extra-row {
            padding: 16px;
        }
        .extra-title {
            font-size: 20px;
            color: white;
            border-left: 4px solid #f59e0b;
            padding-left: 12px;
            margin-bottom: 16px;
        }
        .extra-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 8px 0;
        }
        .extra-item {
            min-width: 140px;
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            border: 1px solid #f59e0b;
        }
        .extra-img { font-size: 40px; }
        .video-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            padding: 16px;
        }
        .video-card {
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #8b5cf6;
            transition: 0.3s;
        }
        .video-card:hover { transform: translateY(-4px); }
        .video-title {
            background: rgba(0,0,0,0.7);
            padding: 14px;
            text-align: center;
            color: white;
            font-weight: bold;
            font-size: 16px;
            border-bottom: 1px solid #8b5cf6;
        }
        .video-frame {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }
        .video-frame video, .video-frame iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .video-info {
            padding: 12px;
            color: white;
            text-align: center;
            font-size: 13px;
        }
        .footer {
            text-align: center;
            padding: 20px;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }
        .no-results {
            text-align: center;
            color: white;
            padding: 40px;
            display: none;
        }
        @media (min-width: 600px) {
            .video-grid { grid-template-columns: repeat(2, 1fr); }
            .nav-btn { padding: 10px 20px; font-size: 14px; }
            .hero h1 { font-size: 54px; }
        }
        @media (min-width: 900px) {
            .video-grid { grid-template-columns: repeat(3, 1fr); }
            .nav-btn { padding: 10px 28px; font-size: 15px; }
        }
    </style>
</head>
<body>

<div class="navbar">
    <button class="nav-btn" onclick="filterMovies('all')">🎬 Все</button>
    <button class="nav-btn" onclick="filterMovies('action')">🔥 Боевики</button>
    <button class="nav-btn" onclick="filterMovies('comedy')">😂 Комедии</button>
    <button class="nav-btn" onclick="filterMovies('drama')">🎭 Драмы</button>
    <button class="nav-btn" onclick="filterMovies('thriller')">🔪 Триллеры</button>
    <button class="nav-btn" onclick="filterMovies('fantasy')">🐉 Фэнтези</button>
</div>

<div class="search-section">
    <div class="search-container">
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 Найти фильм..." onkeyup="searchMovies()">
        <button class="search-btn" onclick="searchMovies()">Поиск</button>
    </div>
    <div id="searchResults" style="color:white; text-align:center; padding:8px; font-size:13px;"></div>
</div>

<div class="hero">
    <h1>🌊 ОКЕАН КИНО</h1>
</div>

<div class="donate-section">
    <div class="modern-donate">
        <h2 style="color:white; font-size:22px;">🎬 Поддержать проект</h2>
        <div class="donate-buttons">
            <button class="donate-btn" onclick="window.open('https://www.donationalerts.com/r/john_logs', '_blank')">💳 Отправить донат</button>
            <div class="qr-wrapper">
                <div class="qr-code-modern">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://www.donationalerts.com/r/john_logs" alt="QR код">
                    <div class="qr-text" style="color:#f59e0b;">📱 Наведи камеру</div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="extra-row">
    <div class="extra-title">🔥 СУПЕРХИТЫ</div>
    <div class="extra-scroll" id="extraRow"></div>
</div>

<div class="video-grid" id="videoGrid"></div>
<div class="no-results" id="noResults">Фильм не найден</div>
<div class="footer">
    <p>🌊 ОКЕАН КИНО</p>
</div>

<script>
const movies = [
    { id: 1, name: "Джон Уик 4", category: "action", emoji: "🔫", info: "Киану Ривз возвращается", videoUrl: "https://www.youtube.com/embed/3zdOsu5sx3Y?controls=0&modestbranding=1&rel=0&showinfo=0" },
    { id: 2, name: "Борат", category: "comedy", emoji: "😂", info: "Скандальная комедия", videoUrl: "https://drive.google.com/file/d/1P4-ylDSx1dyK3Qc6tsO1-b4CPiRGz0Y9/preview" },
    { id: 3, name: "Зеленая Книга", category: "drama", emoji: "🚗", info: "Обладатель Оскара", videoUrl: "https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFunflies.mp4" },
    { id: 4, name: "Аватар 2", category: "fantasy", emoji: "🌊", info: "Возвращение на Пандору", videoUrl: "https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4" },
    { id: 5, name: "Оппенгеймер", category: "thriller", emoji: "💣", info: "Шедевр Нолана", videoUrl: "https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerMeltdowns.mp4" },
    { id: 6, name: "Барби", category: "comedy", emoji: "🎀", info: "Яркая комедия", videoUrl: "https://storage.googleapis.com/gtv-videos-bucket/sample/SubaruOutbackOnStreetAndDirt.mp4" },
    { id: 7, name: "Гладиатор 2", category: "action", emoji: "🏛️", info: "Легенда возвращается", videoUrl: "https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" },
    { id: 8, name: "Дюна 2", category: "fantasy", emoji: "🪱", info: "Пустыня ждёт", videoUrl: "https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4" },
    { id: 9, name: "Фуриоса", category: "action", emoji: "⚡", info: "Безумный Макс", videoUrl: "https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" }
];

function renderAll() {
    renderVideoGrid();
    renderExtraRow();
}

function renderVideoGrid() {
    const grid = document.getElementById('videoGrid');
    grid.innerHTML = '';
    movies.forEach(movie => {
        const card = document.createElement('div');
        card.className = 'video-card';
        card.setAttribute('data-category', movie.category);
        card.setAttribute('data-name', movie.name);
        // Для YouTube и Google Drive используем iframe, для остальных video
        let videoTag;
        if (movie.videoUrl.includes('youtube.com/embed') || movie.videoUrl.includes('drive.google.com')) {
            videoTag = `<iframe src="${movie.videoUrl}" allowfullscreen></iframe>`;
        } else {
            videoTag = `<video controls playsinline><source src="${movie.videoUrl}" type="video/mp4"></video>`;
        }
        card.innerHTML = `
            <div class="video-title">${movie.emoji} ${movie.name}</div>
            <div class="video-frame">${videoTag}</div>
            <div class="video-info">${movie.info}</div>
        `;
        grid.appendChild(card);
    });
}

function renderExtraRow() {
    const extraDiv = document.getElementById('extraRow');
    extraDiv.innerHTML = '';
    const extra = [movies[0], movies[3], movies[7]];
    extra.forEach(m => {
        extraDiv.innerHTML += `<div class="extra-item" onclick="scrollToMovie('${m.name}')"><div class="extra-img">${m.emoji}</div><div class="extra-title-text" style="color:white;">${m.name}</div></div>`;
    });
}

function scrollToMovie(name) {
    const cards = document.querySelectorAll('.video-card');
    for (let card of cards) {
        if (card.querySelector('.video-title').innerText.includes(name)) {
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            break;
        }
    }
}

function searchMovies() {
    const text = document.getElementById('searchInput').value.toLowerCase();
    const cards = document.querySelectorAll('.video-card');
    let found = 0;
    cards.forEach(card => {
        const match = card.getAttribute('data-name').toLowerCase().includes(text);
        card.style.display = (match || text === '') ? 'block' : 'none';
        if (match) found++;
    });
    document.getElementById('noResults').style.display = (found === 0 && text !== '') ? 'block' : 'none';
    document.getElementById('searchResults').innerHTML = text === '' ? '' : `🔍 Найдено: ${found}`;
}

function filterMovies(category) {
    document.getElementById('searchInput').value = '';
    document.getElementById('searchResults').innerHTML = '';
    const cards = document.querySelectorAll('.video-card');
    cards.forEach(card => {
        const cat = card.getAttribute('data-category');
        card.style.display = (category === 'all' || cat === category) ? 'block' : 'none';
    });
    document.getElementById('noResults').style.display = 'none';
}

window.addEventListener('load', renderAll);
</script>
